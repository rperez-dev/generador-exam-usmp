<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Generador Automático de Exámenes
  </title>

  <link
    rel="stylesheet"
    href="css/styles.css"
  >

</head>

<body>

  <!-- =========================
       MODAL
  ========================== -->

  <div
    id="modalOverlay"
    class="modal-overlay hidden"
  >

    <div class="modal-box">

      <div class="modal-header">

        <h3 id="modalTitle">
          Mensaje
        </h3>

      </div>

      <div class="modal-body">

        <div id="modalMessage"></div>

      </div>

      <div class="modal-footer">

        <button
          id="modalCancel"
          class="modal-btn secondary hidden"
        >
          Cancelar
        </button>

        <button
          id="modalConfirm"
          class="modal-btn primary"
        >
          OK
        </button>

      </div>

    </div>

  </div>

  <!-- =========================
       APP
  ========================== -->

  <div class="container">

    <!-- =========================
         HEADER
    ========================== -->

    <header class="main-header">

      <div>

        <h1>
          Generador de Exámenes
        </h1>

        <p>
          Configure el examen, agregue preguntas
          y exporte automáticamente versiones
          presenciales o virtuales.
        </p>

      </div>

    </header>

    <!-- =========================
         CONFIGURACIÓN
    ========================== -->

    <section class="config-card">

      <div class="section-title">

        <h2>
          ⚙ Configuración del examen
        </h2>

      </div>

      <!-- =========================
           FILA SUPERIOR
      ========================== -->

      <div class="config-grid-top">

        <div class="field field-course">

          <label>
            Curso
          </label>

          <input
            id="courseName"
            type="text"
            placeholder="Nombre del curso"
          >

        </div>

        <div class="field">

          <label>
            Indicador
          </label>

          <input
            id="indicator"
            type="text"
            placeholder="Indicador"
          >

        </div>

        <div class="field">

          <label>
            Fecha
          </label>

          <input
            id="courseDate"
            type="date"
          >

        </div>

      </div>

      <!-- =========================
           FILA CONFIG
      ========================== -->

      <div class="config-grid">

        <!-- MODALIDAD -->

        <div class="field">

          <label>
            Modalidad
          </label>

          <select id="examType">

            <option value="PRESENCIAL">
              PRESENCIAL
            </option>

            <option value="VIRTUAL">
              VIRTUAL
            </option>

          </select>

        </div>

        <!-- VERSIONES -->

        <div class="field">

          <label>
            Tipo examen
          </label>

          <select id="examVersions">

            <option value="1">
              A
            </option>

            <option value="2">
              A - B
            </option>

            <option value="3">
              A - B - C
            </option>

          </select>

        </div>

        <!-- FÁCILES -->

        <div class="field">

          <label>
            Fáciles
          </label>

          <input
            id="easyCount"
            type="number"
            value="20"
            min="0"
          >

        </div>

        <!-- INTERMEDIAS -->

        <div class="field">

          <label>
            Intermedias
          </label>

          <input
            id="mediumCount"
            type="number"
            value="10"
            min="0"
          >

        </div>

        <!-- DIFÍCILES -->

        <div class="field">

          <label>
            Difíciles
          </label>

          <input
            id="hardCount"
            type="number"
            value="10"
            min="0"
          >

        </div>

      </div>

    </section>

    <!-- =========================
         CONTADOR
    ========================== -->

    <section class="counter-card">

      <div class="section-title">

        <h2>
          📊 Conteo de preguntas
        </h2>

      </div>

      <div
        id="questionCounter"
        class="counter-bar"
      ></div>

    </section>

    <!-- =========================
         PREGUNTAS
    ========================== -->

    <section
      id="questionsContainer"
      class="questions-wrapper"
    ></section>

    <!-- =========================
         BOTONES
    ========================== -->

    <div class="actions">

      <button
        id="addQuestionBtn"
        class="btn primary-btn"
      >
        + Agregar Pregunta
      </button>

      <button
        id="exportBtn"
        class="btn success-btn"
      >
        ⬇ Exportar
      </button>

      <button
        id="clearBtn"
        class="btn danger-btn"
      >
        🗑 Limpiar Todo
      </button>

    </div>

  </div>

  <!-- =========================
       SCRIPTS
  ========================== -->

  <script
    type="module"
    src="js/app.js"
  ></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</body>

</html>
